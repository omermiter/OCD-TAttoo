services:
  - type: web
    name: ocd-tattoo
    env: static
    buildCommand: npm ci && npm run build
    staticPublishPath: out
    headers:
      - path: /_next/static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
